<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Petite fée 運動穿搭</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400;1,600&family=Noto+Sans+TC:wght@300;400;500&family=Great+Vibes&display=swap" rel="stylesheet">
<style>
  /* 這裡保留您原本的 CSS 樣式設定 */
  :root {
    --sage: #9aab7a;
    --sage-light: #b8c99a;
    --sage-dark: #6b7d55;
    --sage-pale: #e8edd8;
    --cream: #faf8f3;
    --warm-white: #f5f2eb;
    --brown: #5c4a3a;
    --brown-light: #8a7060;
    --olive: #7a8c5a;
    --blush: #e8d5c4;
    --text: #3a3228;
    --text-light: #7a6e64;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Noto Sans TC', sans-serif; background: var(--warm-white); color: var(--text); overflow-x: hidden; line-height: 1.6; }
  
  /* 按鈕樣式修正，確保 <a> 標籤看起來像按鈕 */
  .add-btn {
    display: inline-block;
    width: 100%;
    padding: 10px;
    background: var(--sage);
    color: white;
    text-align: center;
    text-decoration: none;
    border-radius: 5px;
    font-size: 0.9rem;
    transition: background 0.3s;
    border: none;
    cursor: pointer;
  }
  .add-btn:hover { background: var(--sage-dark); color: white; }

  /* 其他 CSS 省略，請保留您原本檔案中的樣式 */
  .product-card { background: white; border-radius: 15px; overflow: hidden; position: relative; transition: transform 0.3s; cursor: pointer; }
  .product-card:hover { transform: translateY(-10px); }
  .product-info { padding: 1.5rem; }
  .footer { padding: 4rem 2rem; background: var(--sage-pale); text-align: center; }
</style>
</head>
<body>

<section class="products" id="products">
  <div class="product-grid">
    
    <div class="product-card">
      <div class="product-img-container">
        <img src="https://images.unsplash.com/photo-1518310383802-640c2de311b2?auto=format&fit=crop&q=80&w=800" alt="雲感運動內衣">
      </div>
      <div class="product-info">
        <h3>雲感高強度運動內衣</h3>
        <p>鼠尾草綠 / 穩定支撐</p>
        <div class="price">NT$ 880</div>
        <a href="https://myship.7-11.com.tw/general/detail/GM2502263407407" target="_blank" class="add-btn">立即購買</a>
      </div>
    </div>

    <div class="product-card">
      <div class="product-img-container">
        <img src="https://images.unsplash.com/photo-1506629082925-63d63d4da310?auto=format&fit=crop&q=80&w=800" alt="裸感提臀褲">
      </div>
      <div class="product-info">
        <h3>裸感提臀高腰褲</h3>
        <p>奶油白 / 視覺收腹</p>
        <div class="price">NT$ 980</div>
        <a href="https://myship.7-11.com.tw/general/detail/GM2502263407407" target="_blank" class="add-btn">立即購買</a>
      </div>
    </div>

    </div>
</section>

<footer>
  <div class="footer-content">
    <div class="footer-logo" style="font-family: 'Cormorant Garamond'; font-size: 2rem; margin-bottom: 1rem;">Petite fée</div>
    <p>優雅地動，自信地穿，成為你自己。</p>
    <div class="footer-links" style="margin: 1.5rem 0;">
      <a href="#" style="margin: 0 10px; color: var(--text); text-decoration: none;">品牌故事</a>
      <a href="#" style="margin: 0 10px; color: var(--text); text-decoration: none;">常見問題</a>
      <a href="#" style="margin: 0 10px; color: var(--text); text-decoration: none;">運送說明</a>
    </div>
    <p style="margin-top: 2rem; opacity: 0.6; font-size: 0.8rem;">&copy; 2026 Petite fée. All rights reserved.</p>
    <p>用愛縫製每一針</p>
  </div>
</footer>

</body>
</html>
